      - title: "Google PageSpeed Insights MCP"
        url: "https://github.com/ncosentino/google-psi-mcp"
        description: "A zero-dependency MCP server exposing Google PageSpeed Insights Core Web Vitals to AI assistants. Analyze individual pages or batch-analyze multiple URLs for actionable performance recommendations."
      - title: "Narnia"
        url: "https://github.com/ncosentino/narnia"
        description: "An MCP server and local web UI for browsing and searching your GitHub Copilot CLI session history. Indexes your local session store, making it easy to retrieve past AI conversations and coding sessions."