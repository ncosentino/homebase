# ─────────────────────────────────────────────────────────────────────────────
# homebase — site configuration
# Fork this repo and edit THIS file to personalize your landing page.
# No code changes needed.
# ─────────────────────────────────────────────────────────────────────────────

# ── Profile ──────────────────────────────────────────────────────────────────
profile:
  name: "Dev Leader"
  username: "@devleader"
  bio: "Principal Software Engineering Manager at Microsoft. Views are my own."
  avatar: "https://github.com/ncosentino.png"
  banner: "/assets/thumbnails/banner.png"

# ── SEO ──────────────────────────────────────────────────────────────────────
seo:
  title: "Dev Leader | @devleader"
  description: "Principal Software Engineering Manager at Microsoft. Content creator, educator, and software engineering enthusiast."
  canonical: "https://github.devleader.ca"
  og_image: "https://github.com/ncosentino.png"
  # Custom domain for GitHub Pages CNAME. Set to your domain (e.g. "links.yoursite.com").
  # Leave blank if using the default youruser.github.io URL (no custom domain).
  cname: "github.devleader.ca"
  keywords:
    - software engineering
    - dotnet
    - csharp
    - microsoft
    - dev leader
    - nick cosentino
  # Used in llms.txt "About" section. Falls back to seo.description if omitted.
  llms_about: "Dev Leader (Nick Cosentino) is a Principal Software Engineering Manager at Microsoft, content creator, and software engineering educator sharing knowledge about software development, C#, .NET, and technology."

# ── UTM Tracking ─────────────────────────────────────────────────────────────
# Page-wide UTM defaults appended to every outbound link.
# Leave utm_source blank to disable UTM tracking entirely.
# Per-link overrides: add a `utm` block on any link to override these defaults.
#
# Example per-link override:
#   - title: "My Course"
#     url: "https://example.com/course"
#     utm:
#       source: "linktree"
#       medium: "referral"
#       campaign: "course-launch"
#       content: "banner"          # optional
#       term: ""                   # optional
utm:
  source: "homebase"
  medium: "link"
  campaign: "devleader"
  content: ""
  term: ""

# ── Theme ────────────────────────────────────────────────────────────────────
theme: devleader

