site_name: Homebase
site_url: https://github.devleader.ca/homebase/
site_description: Config-driven Eleventy template for your personal landing page. Fork it, edit a single YAML file to set your profile, links, and theme -- GitHub Actions handles the rest.
repo_url: https://github.com/ncosentino/homebase
repo_name: ncosentino/homebase
strict: true

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.integrate
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Themes: themes.md
  - CI/CD: cicd.md
  - SEO & Discoverability: seo.md
  - Local Development: building.md
  - Articles: articles.md

plugins:
  - search
  - meta

hooks:
  - docs/hooks/schema.py
  - docs/hooks/llms_txt.py

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ncosentino/homebase

docs_dir: docs
