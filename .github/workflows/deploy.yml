name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── FORK CONFIGURATION ────────────────────────────────────────────────────────
# Set DEPLOY_REPO to your GitHub Pages repo (e.g. "youruser/youruser.github.io")
# Add GH_DEPLOY_TOKEN and GOOGLE_ANALYTICS_ID as repo secrets.
env:
  DEPLOY_REPO: ncosentino/ncosentino.github.io
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
        run: npm run build

      - name: Deploy to GitHub Pages repo
        env:
          GH_DEPLOY_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from homebase @ ${{ github.sha }}"
          git push --force "https://x-access-token:${GH_DEPLOY_TOKEN}@github.com/${DEPLOY_REPO}.git" HEAD:main
