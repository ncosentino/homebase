name: Scheduled Rebuild

# Rebuilds the site on a schedule so time-sensitive content (e.g. latest YouTube
# videos fetched via RSS at build time) stays fresh without a manual push.
#
# ── FORK CONFIGURATION ────────────────────────────────────────────────────────
# Change the cron expression to your preferred rebuild frequency.
# Standard intervals:
#   '0 */6 * * *'   — every 6 hours
#   '0 8 * * *'     — once daily at 8am UTC       ← default
#   '0 8 * * 1'     — once weekly, Monday 8am UTC
#
# To disable scheduled rebuilds entirely, delete this file.
#
# NOTE: GitHub automatically disables scheduled workflows in repos that have had
# no activity (pushes, PRs, etc.) for 60 days. Re-enable via Actions → Enable.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 8 * * *'   # daily at 8am UTC

env:
  DEPLOY_REPO: ncosentino/ncosentino.github.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
        run: npm run build

      - name: Deploy to GitHub Pages repo
        env:
          GH_DEPLOY_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Scheduled rebuild from homebase @ ${{ github.sha }}"
          git push --force "https://x-access-token:${GH_DEPLOY_TOKEN}@github.com/${DEPLOY_REPO}.git" HEAD:main
